<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMU Day 2 ŌĆö Presenter View</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#15130f;color:#eee;font-family:-apple-system,'Segoe UI',Helvetica,sans-serif;overflow:hidden}
  #app{display:flex;height:100vh}
  /* left: slide */
  #left{flex:0 0 62%;display:flex;flex-direction:column;border-right:1px solid #332e26;min-width:0}
  #stagewrap{flex:1;display:flex;align-items:center;justify-content:center;background:#0d0b09;overflow:hidden;position:relative}
  #stage{transform-origin:center center}
  #stage .slide,#stage .dkA-wrap{box-shadow:0 18px 50px -20px rgba(0,0,0,.8) !important}
  /* right: notes */
  #right{flex:1;display:flex;flex-direction:column;min-width:0;background:#1c1914}
  #notehead{padding:16px 22px 10px;border-bottom:1px solid #332e26}
  #noteslide{font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#c9a89c}
  #notetitle{font-family:Georgia,'Times New Roman',serif;font-size:26px;margin-top:6px;color:#f3efe6;line-height:1.15}
  #notes{flex:1;overflow-y:auto;padding:20px 24px;font-size:32px;line-height:1.55;color:#dcd6ca}
  #notes b{color:#fff}
  #notes em{color:#e8a08c;font-style:italic}
  #notes .lbl{color:#d8442a;font-weight:700}
  #notes p{margin:0 0 13px}
  #notes li{margin:0 0 7px 18px}
  #notes .empty{color:#7a7264;font-style:italic}
  /* bottom bar */
  #bar{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:10px 18px;background:#1c1914;border-top:1px solid #332e26}
  #bar button{background:#2a251d;color:#eee;border:1px solid #4a4334;border-radius:7px;padding:9px 16px;font-size:15px;cursor:pointer}
  #bar button:hover{background:#3a3328}
  #counter{font-family:'Spline Sans Mono',monospace;font-size:14px;color:#b8b0a0;min-width:90px}
  #bar .sp{flex:1}
  #bar a{color:#c9a89c;font-size:13px;text-decoration:none;border:1px solid #4a4334;border-radius:7px;padding:8px 12px}
  #bar a:hover{color:#fff}
  #thumb{font-family:'Spline Sans Mono';font-size:12px;color:#8a8273;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:#b8b0a0;background:#15130f;z-index:50}
  kbd{background:#2a251d;border:1px solid #4a4334;border-radius:4px;padding:1px 6px;font-size:12px;font-family:'Spline Sans Mono'}
</style>
</head>
<body>
<div id="loading">Loading deck + notesŌĆ”</div>
<div id="app" style="display:none">
  <div id="left">
    <div id="stagewrap"><div id="stage"></div></div>
  </div>
  <div id="right">
    <div id="notehead"><div id="noteslide">ŌĆö</div><div id="notetitle">ŌĆö</div></div>
    <div id="notes"></div>
    <div id="bar">
      <button id="prev">ŌåÉ Prev</button>
      <button id="next">Next ŌåÆ</button>
      <span id="counter">ŌĆö / ŌĆö</span>
      <span id="thumb"></span>
      <span class="sp"></span>
      <button id="reload" title="Re-fetch the .md notes">Ōå╗ Reload notes</button>
      <a href="smu-day2-full-deck.html" target="_blank">Open deck for projecting ŌåŚ</a>
    </div>
  </div>
</div>
<script>
const DECK='smu-day2-full-deck.html';
const NOTES='smu-day2-course-script.md';
let slides=[], slideNum=[], slideTitle=[], notesArr=[], idx=0;

function mdInline(t){
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  t=t.replace(/(^|[^*])\*([^*]+?)\*/g,'$1<em>$2</em>');
  t=t.replace(/`(.+?)`/g,'<code style="background:#2a251d;padding:1px 5px;border-radius:3px">$1</code>');
  // highlight leading labels like **Say:** already bolded; also bare "Say:" / "Facilitate:"
  t=t.replace(/<b>(Say|Facilitate|On slide|On the slide|Example|Exercise|Lecturer script)([^<]*)<\/b>/g,'<b class="lbl">$1$2</b>');
  return t;
}
function mdToHtml(md){
  if(!md) return '<p class="empty">No note for this slide yet ŌĆö add a section in the .md file.</p>';
  const lines=md.split('\n'); let out=[], inList=false;
  for(let ln of lines){
    ln=ln.trim();
    if(!ln){ if(inList){out.push('</ul>');inList=false;} continue; }
    if(ln==='---'){ out.push('<hr style="border:none;border-top:1px solid #332e26;margin:14px 0">'); continue; }
    if(/^[-ŌĆó]\s+/.test(ln)){ if(!inList){out.push('<ul>');inList=true;} out.push('<li>'+mdInline(ln.replace(/^[-ŌĆó]\s+/,''))+'</li>'); continue; }
    if(inList){out.push('</ul>');inList=false;}
    out.push('<p>'+mdInline(ln)+'</p>');
  }
  if(inList)out.push('</ul>');
  return out.join('');
}

function parseNotes(md){
  // split on '### ' headers
  const parts=md.split(/\n###\s+/); parts.shift();
  const blocks=parts.map(p=>{
    const nl=p.indexOf('\n');
    const header=(nl<0?p:p.slice(0,nl)).trim();
    const body=(nl<0?'':p.slice(nl+1)).replace(/\n#.*$/s,'').trim();
    let nums=[];
    const range=header.match(/\{S5-(\d+)\}\s*[ŌĆō-]\s*\{S5-(\d+)\}/);
    if(range){for(let n=+range[1];n<=+range[2];n++)nums.push(n);}
    else{ const m=header.match(/[\[\{](?:S5-)?(\d+)[\]\}]/); if(m)nums.push(+m[1]); }
    // clean header for display
    const disp=header.replace(/^[\[\{](?:S5-)?\d+[\]\}]\s*/,'').replace(/^(DIVIDER|COVER|END)\s*[ŌĆö-]?\s*/,'').trim()||header;
    return {header,disp,body,nums,numbered:nums.length>0};
  });
  return blocks;
}

function align(blocks){
  // 1:1 order alignment ŌĆö Nth note block Ōåö Nth slide (robust to badge renumbering)
  return slides.map((_,i)=> blocks[i] || null);
}

function show(i){
  idx=Math.max(0,Math.min(slides.length-1,i));
  const st=document.getElementById('stage');
  st.innerHTML=''; st.appendChild(slides[idx].cloneNode(true));
  // scale to fit
  const wrap=document.getElementById('stagewrap');
  const sw=wrap.clientWidth-32, sh=wrap.clientHeight-32;
  const scale=Math.min(sw/1280, sh/720);
  st.style.transform='scale('+scale+')';
  st.style.width='1280px'; st.style.height='720px';
  // note
  const n=notesArr[idx];
  document.getElementById('noteslide').textContent = (slideNum[idx]!=null? 'Slide '+slideNum[idx] : (n?n.header.split(/[ŌĆö-]/)[0].trim():'ŌĆö'));
  document.getElementById('notetitle').innerHTML = n? mdInline(n.disp) : slideTitle[idx]||'ŌĆö';
  document.getElementById('notes').innerHTML = mdToHtml(n?n.body:'');
  document.getElementById('notes').scrollTop=0;
  document.getElementById('counter').textContent=(idx+1)+' / '+slides.length;
  document.getElementById('thumb').textContent=slideTitle[idx]||'';
}

async function loadNotes(){
  try{ const md=await (await fetch(NOTES+'?t='+Date.now())).text(); notesArr=align(parseNotes(md)); show(idx); }
  catch(e){ console.warn('notes load failed',e); }
}

async function fetchDeck(){
  for(const u of [DECK,'index.html']){
    try{ const r=await fetch(u); if(r.ok) return await r.text(); }catch(e){}
  }
  throw new Error('deck file not found (tried '+DECK+' and index.html)');
}
async function init(){
  const html=await fetchDeck();
  // inject all <style> blocks
  const styles=[...html.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/g)].map(m=>m[1]).join('\n');
  const st=document.createElement('style'); st.textContent=styles; document.head.appendChild(st);
  // also pull font link
  const fl=html.match(/<link href="https:\/\/fonts[^"]+"/); if(fl){const l=document.createElement('link');l.rel='stylesheet';l.href=fl[0].match(/href="([^"]+)"/)[1];document.head.appendChild(l);}
  const doc=new DOMParser().parseFromString(html,'text/html');
  const els=doc.querySelectorAll('div.dk1, div.dk2, div.dkA-wrap');
  els.forEach(el=>{
    let node;
    if(el.classList.contains('dkA-wrap')){ const w=doc.createElement('div'); w.className='dkA'; w.appendChild(el.cloneNode(true)); node=w; }
    else { node=el.cloneNode(true); }
    slides.push(node);
    const badge=node.querySelector('.num'); const foot=[...node.querySelectorAll('div,span')].map(x=>x.textContent).find(t=>/^\d+\s*\/\s*\d+$/.test(t.trim()));
    let num=null;
    if(badge && /^\d+$/.test(badge.textContent.trim())) num=+badge.textContent.trim();
    else if(foot) num=+foot.trim().split('/')[0];
    slideNum.push(num);
    const h=node.querySelector('h1, .t-title, .t-display, .hero-title, .eyebrow');
    slideTitle.push(h?h.textContent.trim().slice(0,60):'');
  });
  await loadNotes();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  show(0);
}
document.getElementById('prev').onclick=()=>show(idx-1);
document.getElementById('next').onclick=()=>show(idx+1);
document.getElementById('reload').onclick=loadNotes;
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ')show(idx+1);
  if(e.key==='ArrowLeft'||e.key==='PageUp')show(idx-1);
});
window.addEventListener('resize',()=>show(idx));
init();
</script>
</body>
</html>
